<!DOCTYPE html>
<html>
<head>
    <title>Neon Flappy - Fixed Start</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #080710; text-align: center; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; color: white; }
        canvas { display: block; margin: 20px auto; border-radius: 15px; box-shadow: 0 0 35px rgba(255, 0, 128, 0.3); max-width: 95%; background: #0f0e17; }
        h1 { font-size: 24px; margin: 10px 0 5px 0; text-transform: uppercase; letter-spacing: 2px; color: #ff007f; text-shadow: 0 0 10px #ff007f; }
        p { font-size: 14px; margin: 0; color: #a0a0b8; }
    </style>
</head>
<body>
    <h1>NEON FLAPPY</h1>
    <p>Tap to Fly. Smooth & Zero Lag.</p>
    <canvas id="flappyCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById("flappyCanvas");
        const ctx = canvas.getContext("2d");

        let score = 0;
        let gameActive = false; // गेम शुरू में रुका रहेगा
        let gameStarted = false; // पहली बार टच करने पर चालू होगा

        // Bird Settings
        let bird = { x: 80, y: 250, size: 14, gravity: 0.4, velocity: 0, jump: -7 };

        // Pipes Array
        let pipes = [];
        let pipeWidth = 55;
        let pipeGap = 150; // गैप थोड़ा और बढ़ा दिया ताकि निकलना आसान हो
        let pipeSpeed = 3;
        let frameCount = 0;

        // Stars Background & Particles
        let stars = [];
        let particles = [];

        for(let i=0; i<30; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2 });
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    size: Math.random() * 4 + 1,
                    alpha: 1
                });
            }
        }

        function update() {
            if (!gameActive) return;

            frameCount++;

            // Bird Physics
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // Ground & Sky Collision
            if (bird.y + bird.size >= canvas.height || bird.y - bird.size <= 0) {
                gameOver();
            }

            // Spawn Pipes
            if (frameCount % 100 === 0) {
                let minHeight = 50;
                let maxHeight = canvas.height - pipeGap - minHeight;
                let topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
                pipes.push({ x: canvas.width, top: topHeight, passed: false });
            }

            // Move & Check Pipes
            pipes.forEach((pipe, index) => {
                pipe.x -= pipeSpeed;

                // Collision
                if (bird.x + bird.size > pipe.x && bird.x - bird.size < pipe.x + pipeWidth) {
                    if (bird.y - bird.size < pipe.top || bird.y + bird.size > pipe.top + pipeGap) {
                        gameOver();
                    }
                }

                // Score
                if (!pipe.passed && pipe.x + pipeWidth < bird.x) {
                    score++;
                    pipe.passed = true;
                    if(score % 5 === 0) pipeSpeed += 0.5;
                }

                if (pipe.x + pipeWidth < 0) {
                    pipes.splice(index, 1);
                }
            });

            // Particles
            particles.forEach((p, index) => {
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
                if (p.alpha <= 0) particles.splice(index, 1);
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Background Stars
            ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
            stars.forEach(star => ctx.fillRect(star.x, star.y, star.size, star.size));

            // Neon Pipes
            pipes.forEach(pipe => {
                let topGrad = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipeWidth, 0);
                topGrad.addColorStop(0, '#00f2fe'); topGrad.addColorStop(1, '#4facfe');
                ctx.fillStyle = topGrad;
                ctx.shadowBlur = 15; ctx.shadowColor = "#00f2fe";
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);

                let bottomGrad = ctx.createLinearGradient(pipe.x, pipe.top + pipeGap, pipe.x + pipeWidth, 0);
                bottomGrad.addColorStop(0, '#00f2fe'); bottomGrad.addColorStop(1, '#4facfe');
                ctx.fillStyle = bottomGrad;
                ctx.fillRect(pipe.x, pipe.top + pipeGap, pipeWidth, canvas.height - (pipe.top + pipeGap));
            });

            // Draw Bird
            ctx.fillStyle = "#ff007f";
            ctx.shadowBlur = 20; ctx.shadowColor = "#ff007f";
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, bird.size, 0, Math.PI * 2);
            ctx.fill();

            // Particles
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 0, 127, ${p.alpha})`;
                ctx.shadowBlur = 0;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });

            // UI Overlay
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#ffffff";
            
            if (!gameStarted) {
                // START SCREEN TEXT
                ctx.font = "bold 24px Arial";
                ctx.fillStyle = "#00f2fe";
                ctx.fillText("TAP TO START 🎮", canvas.width/2 - 90, canvas.height/2);
                ctx.font = "14px Arial";
                ctx.fillStyle = "#aaa";
                ctx.fillText("Ball will fly when you touch", canvas.width/2 - 85, canvas.height/2 + 30);
            } else {
                ctx.font = "bold 20px Arial";
                ctx.fillText("SCORE: " + score, 20, 40);
            }
        }

        function gameOver() {
            gameActive = false;
            gameStarted = false;
            createExplosion(bird.x, bird.y);
            setTimeout(() => {
                alert("🎮 Game Over!\nYour Score: " + score);
                resetGame();
            }, 150);
        }

        function resetGame() {
            bird.y = 250; bird.velocity = 0;
            pipes = []; score = 0; pipeSpeed = 3; frameCount = 0;
            gameActive = false;
            gameStarted = false;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Controls
        function flappyJump() {
            if (!gameStarted) {
                gameStarted = true;
                gameActive = true;
            }
            if (gameActive) {
                bird.velocity = bird.jump;
            }
        }

        window.addEventListener("keydown", (e) => { if (e.code === "Space") flappyJump(); });
        window.addEventListener("touchstart", (e) => { e.preventDefault(); flappyJump(); }, { passive: false });

        gameLoop();
    </script>
</body>
</html>
